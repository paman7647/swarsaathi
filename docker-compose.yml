services:
  backend:
    build: ./core
    environment:
      APP_NAME: SwarSaathi Voice Bot
      ENVIRONMENT: production
      DATABASE_URL: sqlite:////service/data/voice_bot.db
      CORS_ORIGINS: http://localhost:8080
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-3.5-flash}
      MAX_HISTORY_TURNS: 8
    volumes:
      - voice_bot_data:/service/data
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      args:
        VITE_API_URL: /api
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  voice_bot_data:
